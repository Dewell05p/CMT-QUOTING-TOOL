name: Fetch Google Sheet Data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/30 * * * *'     # Every 30 minutes
  workflow_dispatch:           # Allow manual trigger

# Prevents multiple builds running at the same time (fixes your main error)
concurrency:
  group: fetch-google-sheet-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Fetch data from Google Apps Script
        run: |
          echo "Fetching latest data from Google Sheet..."
          curl -L -f "${{ secrets.APPS_SCRIPT_URL }}" -o data.json || echo "❌ Failed to fetch data"
          
          # Optional: Show first few lines for debugging
          echo "=== First 10 lines of data.json ==="
          head -n 10 data.json || echo "data.json is empty or not generated"

      - name: Commit new data (if changed)
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update: Fetched new data from Google Sheet"
          file_pattern: data.json
          branch: main
